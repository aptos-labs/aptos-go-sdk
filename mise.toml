[tools]
go = "1.25.10"
golangci-lint = "2.12.1"
gofumpt = "0.10.0"
node = "20.14.0"

[env]
# GOTOOLCHAIN=auto so each go.mod controls its own toolchain version:
#   * v1 (./go.mod) declares `toolchain go1.24.2` — Go uses the mise-pinned 1.24.2.
#   * v2 (./v2/go.mod) declares `toolchain go1.25.10` — Go fetches and uses 1.25.10.
# This is required because v2 has advanced beyond v1's Go version. Using
# GOTOOLCHAIN=local would block the v2 coverage job (the only CI job that
# enters v2/) from compiling at all:
#   go: go.mod requires go >= 1.25.0 (running go 1.24.2; GOTOOLCHAIN=local)
# The version actually used in each tree remains deterministic — it's
# pinned in the respective go.mod — but Go is now allowed to satisfy
# those pins by downloading the toolchain Aptos-Labs publishes via the
# official Go module proxy.
GOTOOLCHAIN = "auto"

[tasks.fmt]
description = "Format Go source files with gofumpt"
run = "gofumpt -l -w ."

[tasks.fmt-check]
description = "Check formatting with gofumpt (CI parity)"
run = """
set -e
out=$(gofumpt -l -e .)
if [ -n "$out" ]; then
    echo "Formatting is wrong, please run: mise run fmt"
    echo "$out"
    exit 1
fi
echo "Formatting is good"
"""

[tasks.lint]
description = "Run golangci-lint on the v1 module"
run = "golangci-lint run"

[tasks."lint:v2"]
description = "Run golangci-lint on the v2 module"
dir = "v2"
run = "golangci-lint run"

[tasks.test]
description = "Run unit tests for v1 (use 'go test ./...' for full)"
run = "go test -short ./..."

[tasks."test:v2"]
description = "Run v2 unit tests"
dir = "v2"
run = "go test -short ./..."

[tasks.vet]
description = "Run go vet on the v1 module"
run = "go vet ./..."

[tasks.ci]
description = "Run all CI checks locally (vet, fmt-check, lint)"
depends = ["vet", "fmt-check", "lint"]
