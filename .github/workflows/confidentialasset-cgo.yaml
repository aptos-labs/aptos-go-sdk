# Optional: build confidential-asset FFI and run CGO tests for v2/confidentialasset
# and the CGO-only example v2/examples/confidential_asset.
# Default CI (codecov, lint:v2) runs with CGO_ENABLED=0; v2/confidentialasset keeps !cgo stubs,
# while examples/confidential_asset is excluded from the build when CGO is off.
name: Confidential asset (CGO)

on:
  pull_request:
    paths:
      - "v2/confidentialasset/**"
      - "v2/examples/confidential_asset/**"
      - "v2/go.mod"
      - "v2/go.sum"
      - ".github/workflows/confidentialasset-cgo.yaml"
  push:
    branches:
      - main
    paths:
      - "v2/confidentialasset/**"
      - "v2/examples/confidential_asset/**"
      - "v2/go.mod"
      - "v2/go.sum"

jobs:
  test-cgo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout confidential-asset-bindings
        uses: actions/checkout@v6
        with:
          repository: aptos-labs/confidential-asset-bindings
          path: confidential-asset-bindings

      - uses: jdx/mise-action@v4
        with:
          install_args: "go"
          cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build FFI
        working-directory: confidential-asset-bindings/rust
        run: cargo build -p aptos_confidential_asset_ffi --release

      - name: Point bindings replace at CI checkout
        working-directory: v2
        run: |
          go mod edit -replace github.com/aptos-labs/confidential-asset-bindings/bindings/go="${GITHUB_WORKSPACE}/confidential-asset-bindings/bindings/go"

      - name: Test confidentialasset + CGO example (CGO)
        working-directory: v2
        env:
          CGO_ENABLED: "1"
        run: go test -short ./confidentialasset/... ./examples/confidential_asset/...
