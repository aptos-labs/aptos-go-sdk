name: "Go Unit Tests"
description: |
  Run Go unit tests. The Go version is pinned via mise.toml so the build
  uses the same toolchain as the lint and format jobs.

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        install_args: "go"
        cache: true
    # Run a local testnet in the background. After this action runs the local testnet
    # should be up and queryable. This also installs node and pnpm for us.
    - uses: aptos-labs/actions/run-local-testnet@fdd3a3a628c840d5c35086a87e9cc3141b635505 # main@2026-05-20
      with:
        PNPM_VERSION: 8.9.0

    - shell: bash
      run: |
        if [ "x$(git status -uno -s)x" != "xx" ]; then git status; echo NOT CLEAN; exit 1; fi
    - shell: bash
      run: 'go test ./...'
