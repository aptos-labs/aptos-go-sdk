name: "gofumpt formatting check"
description: |
  Check Go source formatting with gofumpt at the version pinned in mise.toml.

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@v4
      with:
        install_args: "go gofumpt"
        cache: true
    - shell: bash
      run: 'go vet ./...'
    - shell: bash
      run: 'mise run fmt-check'
